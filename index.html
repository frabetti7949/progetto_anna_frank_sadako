<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci nel Silenzio | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfcf9; --text: #1a1a1a; --line: #e0ddd5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        
        header { text-align: center; padding: 15vh 10% 5vh; }
        header h1 { font-family: 'Playfair Display'; font-size: 3.5rem; font-weight: 400; margin-bottom: 1rem; }
        header p { font-style: italic; color: #666; font-size: 1.1rem; }

        .container { display: flex; gap: 2rem; max-width: 1100px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
        .card { flex: 1; background: white; border: 1px solid var(--line); padding: 4rem 2rem; text-decoration: none; color: inherit; text-align: center; transition: all 0.5s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: #ccc; }
        .card span { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #999; display: block; margin-bottom: 1rem; }
        .card h2 { font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 1rem; }
        
        .unity-line { width: 1px; height: 80px; background: var(--line); margin: 0 auto; }

        @media (max-width: 768px) { .container { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h1>Due Vite, Un Messaggio</h1>
        <p>Storie di resistenza e speranza oltre i confini del tempo.</p>
        <a href="abstract.html" class="abstract-link">Abstract</a>
    </header>
    <div class="unity-line"></div>
    <main class="container">
        <a href="anna.html" class="card">
            <span>Amsterdam, 1942</span>
            <h2>Anna Frank</h2>
            <p>La forza della parola scritta.</p>
            <img src="anna_frank2.jpeg">
        </a>
        <a href="sadako.html" class="card">
            <span>Hiroshima, 1945</span>
            <h2>Sadako Sasaki</h2>
            <p>Il volo della speranza fragile.</p>
            <img src="Sadako_Sasaki2.jpeg">
        </a>
    </main>
</body>
</html>
